name: build

# Build the single `teams` binary on every push to master and publish it as a
# rolling "latest" GitHub release, so `install.sh` can always fetch the newest
# build. Tests run first as a hard gate — a red suite blocks the release.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-latest
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install UI dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      # --- gate: deterministic tests must pass before we publish anything ---
      - name: Backend tests
        run: cargo test

      # The full UI suite includes live-tenant tests that require the Microsoft
      # Identity Broker over D-Bus. Run only deterministic history tests in CI.
      - name: UI history tests
        working-directory: ui
        run: bun test src/message-history.test.ts src/message-scroll.test.ts

      # The web client's tests are fully deterministic (pure logic + a fake
      # WebSocket), so the whole suite runs in CI, plus a typecheck gate.
      - name: Web tests
        working-directory: web
        run: bun run test

      - name: Web typecheck
        working-directory: web
        run: bun run typecheck

      # --- build the single self-contained binary ---
      - name: Build backend (release)
        # Embed the commit this binary is built from so the running app can tell
        # whether a newer rolling `latest` release exists (see src/update.rs).
        env:
          TEAMS_BUILD_REV: ${{ github.sha }}
        run: cargo build --release --bin server

      - name: Compile single `teams` binary
        # build.ts also builds the web UI and embeds it, so `teams --web` works
        # from the published binary (web deps were installed above).
        working-directory: ui
        run: bun run build.ts

      - name: Stage release asset
        run: |
          mkdir -p out
          cp ui/dist/teams out/teams-linux-x64

      - name: Publish rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Recreate the rolling tag so `latest` always points at this commit.
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest out/teams-linux-x64 \
            --title "teams-lite (latest)" \
            --notes "Rolling build from ${GITHUB_SHA} — $(date -u +%Y-%m-%dT%H:%M:%SZ)." \
            --target "${GITHUB_SHA}" \
            --latest
